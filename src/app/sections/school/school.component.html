<section id="school" class="section" aria-labelledby="school-title">
  <div class="container">
    <div appRevealOnScroll>
      <app-section-title id="school-title" [title]="content().sectionTitles.school"></app-section-title>
    </div>

    <div class="timeline">
      @for (school of content().school; track school.diplome + school.period) {
        <article class="surface timeline-item" appRevealOnScroll>
          <header>
            <h3 [innerHTML]="school.diplome | richText"></h3>
            <p [innerHTML]="school.school | richText"></p>
            <span [innerHTML]="school.period | richText"></span>
          </header>
        </article>
      }
    </div>
  </div>
</section>
